<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Citizen Services Request Form</title>
   
</head>
<body>

    <h1>Citizen Services Request Form</h1>

    <form action="#" method="post">

        <fieldset>
            <legend>Personal Information</legend>
            
            <div>
                <label for="full-name">Full Name:</label>
                <input type="text" id="full-name" name="full-name" required>
            </div>

            <br>

            <div>
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob">
            </div>

            <br>

            <div>
                <label>Gender:</label>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male" class="inline-label">Male</label>
                
                <input type="radio" id="female" name="gender" value="female">
                <label for="female" class="inline-label">Female</label>
            </div>

            <br>

            <div>
                <label for="nat-id">National ID Number:</label>
                <input type="text" id="nat-id" name="nat-id" maxlength="12">
            </div>
        </fieldset>

        <br>

        <fieldset>
            <legend>Contact Details</legend>
            
            <div>
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com">
            </div>

            <br>

            <div>
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone">
            </div>

            <br>

            <div>
                <label for="address">Home Address:</label>
                <textarea id="address" name="address" rows="3" cols="30"></textarea>
            </div>
        </fieldset>

        <br>

        <fieldset>
            <legend>Service Details</legend>

            <div>
                <label for="service-type">Service Type:</label>
                <select id="service-type" name="service-type">
                    <option value="">--Please choose an option--</option> 
                    <option value="passport">Passport Renewal</option>
                    <option value="license">Driver's License</option>
                </select>
            </div>

            <br>

            <div>
                <label>Request Priority:</label>
                <input type="radio" id="normal" name="priority" value="normal" checked>
                <label for="normal" class="inline-label">Normal</label>
                
                <input type="radio" id="urgent" name="priority" value="urgent">
                <label for="urgent" class="inline-label">Urgent</label>
            </div>

            <br>

            <div>
                <label for="doc-upload">Upload Document Reference:</label>
                <input type="file" id="doc-upload" name="doc-upload">
            </div>

            <br>

            <div>
                <label for="comments">Additional Comments:</label> <br>
                <textarea id="comments" name="comments" rows="7" cols="30"></textarea>
            </div>
        </fieldset>

        <br>

        <div>
            <input type="checkbox" id="confirm" name="confirm" required>
            <label for="confirm" class="inline-label">I confirm all information is accurate</label>
        </div>
            <br>
        <div style="margin-top: 20px;">
            <button type="submit">Submit Request</button>
            <button type="reset">Reset Form</button>
        </div>

    </form>

</body>
</html>
